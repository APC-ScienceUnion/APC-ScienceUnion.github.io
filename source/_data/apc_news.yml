    特在此鸣谢天文摄影师Julien Looten ，您的地中海上空的流星和银河成就了这张合成图。我想，当年的查尔斯·梅西耶看到的也是这样的天空吧。图片来源及版权： Julien Looten（原图在第12张）
    -“你为什么选择当海军天文官？”
    -“理由其实很多的，但，星星就在那里，不是吗？”
    以上对话虽然未必发生过，答案也很可能不是这个，但我相信这是梅西耶和众多天文爱好者心里的话。
    虽然是私设，但是人物形象和道具也有参考（人物形象参考图在倒数第二张，翻译之后的图就不放了），不过在此依然致歉：裤子和望远镜真的是一年又一年的劳模，从达尔文到梅西耶/捂脸指南针当时是真买不起，用的是美军指南针，嗯老熟人了，林奈里用的就是它。合成好贵，抱歉就修了一张合成
    想说的话：
    致雨叔：谢谢开车拉我去丁香湖！
    致乎乎：谢谢乎乎姐能接这么冷门的cos妆，我觉得我每次约妆都是离谱敲门，谢谢圆孩子一个梦。
    致妖宵：拯救动作废呜呜呜，不愧是你啊！
    致超新星：感谢学弟忙前忙后，还赶DDL写稿。原图就一两颗星星你都能认出来一个，绝了！
    致鲁哲：哥！你是我亲哥！这么冷门的东西你还能找到参考图，神了！当年大青沟一行遇上你我是挖到历史宝藏了。
    致老马：丁香湖的晚上真不像海/笑哭但是相比五里河沙滩的光污染，丁香湖还算是和蔼可亲的。感谢老哥历史考究忙前忙后，费心了。
    致施奈尔先生：您是真正的绅士，服饰方面帮了我大忙！欧洲史之后还得多多费心，拜托了。
    致宋词：感谢慷慨的指点，没有你我真的会懵。欢迎和我一起开启2023的星辰大海。
