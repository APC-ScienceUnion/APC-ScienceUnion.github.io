- title: 2025春节贺词 | 与长蛇共舞星河，携星光奔赴新程
  start: 2025-01-29
  end: 2025-01-29
  cover: https://i3.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1ie2gymjndfj30u00u0wlc.jpg
  content: |
    亲爱的各位伙伴：

    新春的钟声在星野中回响，值此乙巳蛇年到来之际，让我们仰望苍穹，共贺新春！

    图上贯穿2025的图案是长蛇座（Hydra），这条横跨全天四分之一的古老星蛇，在夜空中绘就夜空中最壮阔的图腾。值此甲辰辞岁、乙巳启新之时，愿我们如长蛇座中那颗穿越3万光年而来的球状星团M68，在时光长河里保持凝聚的热望；更愿每位追星人化身巨蟹座旁的长蛇之眼，以赤诚之心守护宇宙的诗意。

    2025，愿星辰指引迷途者，科学照亮求知路，智慧的火种比长蛇座的星光更加恒久！

    格物社/A.P.C.科学联盟 敬贺
