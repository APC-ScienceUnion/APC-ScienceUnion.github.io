- title: 科学家系列cosplay第四弹：牛顿
  start: 2021-01-01
  end: 2020-01-01
  cover: https://i2.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1ie1a6qrefyj30zl1hc424.jpg
  content: |
    道法自然，久藏玄冥，天生牛顿，万物生明。
    出镜：天狼王
    妆娘：乎乎
    摄影：雨叔
    棚子：妖宵
    后期：松子明
    选片：苏晨、乐乐、松子明、陆青 
    第一顾问：施奈尔先生
    神秘学顾问：瓜子
    呼叫组织@格物社｜泛科普 official @物理组-一毫秒的永恒 
    排版顺序大体是力学光学神秘学，图二是在具象化牛顿第一定律。
    还有就是，反正不要钱，多少信一点！渡鸦12345在上～
    可能有人好奇瓶子里是啥。瓶子里装了朱砂、硫磺、食盐、植物叶子，还有各种调料。
    背景说明：1666年，伦敦大瘟疫，大学被迫关闭，年轻的牛顿回家学习。在当时，神学和神秘学大行其道，如此大规模的瘟疫很难不让人联想到上帝灭世。年轻的牛顿在家里搞科研之余也会惴惴不安地向上帝祈祷，希望能见到未来的样子，希望能知道未来是好是坏。上帝回应了，上帝搞错了，上帝把林奈带到了现代。所以说科学存在误差，上帝要相信它。蝶自百年来，片翼掠鸿海。牛顿引发了蝴蝶效应。黑鹄同风起，林奈被送到现代。落羽灰犀蹄，林奈的经历和所见所得影响了达尔文。
    ![活动海报](https://i2.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1ie1a6qrefyj30zl1hc424.jpg)

- title: 科学家系列cosplay第三弹：林奈
  start: 2020-11-28
  end: 2020-11-28
  cover: https://i0.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1ie1a2bv6htj31hc0zk4hc.jpg
  content: |
    蝶自百年来，片翼掠鸿海。黑鹄同风起，落羽灰犀蹄。这是一个横跨数个世纪关于宇宙和混沌学的故事，也是科学家cosplay系列的第三弹
    文案：天狼王 
    出镜：天狼王 、威龙
    妆娘：浔笙
    道具:三
    假发：猹子，白狼 （那天真的是忙忘了，抱歉没带）
    摄影：冷月独星
    棚子：妖宵
    花絮拍摄：雨轩、忠霖
    后勤：忠霖、雨轩、浔笙 ，还有二位无好友，手动@TZ和佚名妹子
    欧洲历史顾问：Herr von.Schnelltenberg
    服装设计小组：天狼王、威龙、飞豹
    后期：松子明（御用后期，功德无量！最可爱的人！）
    剧情研讨：欧姆希洛呱、冷月独星 
    特别鸣谢：威龙、毫秒、官号 感谢E.A.K.和A.P.C.的平台
    协力：雨叔、妖宵、乎乎、铃岚、狗哥、白水、陆青、苏晨、乐乐、凤歌、Fan_GG、kviio
    以及：T恤衫是自己设计的，笔袋是果壳家的。
    ～～～～～以下是分割线～～～～～
    首先很对不起大家，其实这套片儿出的很仓促，整体时间特别长，如果以上名单有哪里遗漏那是我记忆不行脑子不够用了，实在抱歉。    
    我现在是大四上学期，去年想着一年一套的速度来，结果今年开年疫情我就去伍连德了/笑哭然后历经半年多的国内疫情波折，我很多东西都放在学校但那时学校不让回去。当时网课间隙也没有九月开学风声，我合计着赶早不赶晚就急三火四地上马了。至于立项……达尔文正片时早就墙上挂着呢/笑哭说回来，时空穿越的灵感来自神秘博士第五季第十集，考虑到梵高的衣着并非符合原来的时代，我就想到用类似的手法完成外景拍摄。  
    拍摄之前虽然做了很多的准备工作，但很显然还出了很大的问题，在这里我要特别特别感谢忠霖@江陵决绝 他在整套正片过程中帮我跑前跑后，一起定了很多很多的事情，还告诉我很多道理，可谓劳苦功高！
    拍摄当天出了很多问题，我少年假发忘带了，白狼辛苦，但是那天实在实在对不住@w白w 。本来想让林奈少小离家老大回，不去拉普兰探险去未来转一圈，变成晚年的他去未来转一圈/捂脸。谢谢乎乎姐@乎乎接妆 美瞳现货0-800度 帮我解决克拉巴特（领巾）问题，雨叔@烟雨飘渺 帮我扎，@妖宵宵想不劳而获 抱歉妖宵姐你家门我当时冲动了/捂脸/捂脸/捂脸外景选址其实我可以做得更好的，辛苦大家陪我远走高飞了。经验还是不够，下回一定改进。    
    然后是关于花絮的问题：其实我是有试过像无穷小亮一样介绍东西，其实都已经有准备胡萝卜大头菜和土豆，但是因为我稿子没背熟练，他们科属种错漏不少，我懒得重拍和重做了，又不能发出来误人子弟，很抱歉委屈二位了@余烬万金油(贼TM可爱miku版) @江陵决绝 雨轩拍了一些花絮，我直接放的抖音码，有兴趣可以扫一下看看。
    这两天最感谢的还是格物社的各位朋友们，尤其是官号@格物社｜泛科普 official 和毫秒@物理组-一毫秒的永恒 ，天天正事还能养出火花/捂脸感谢在百忙之中接纳和支持我，谢谢谢谢
    感谢大家！喜欢劳K~
    ![活动海报](https://i0.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1ie1a2bv6htj31hc0zk4hc.jpg)

