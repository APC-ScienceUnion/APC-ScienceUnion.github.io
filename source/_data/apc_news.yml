  content: |
    元素宇宙（以下简称EU）企划第一弹：关于氢的一些细节

    这是第一个来到EU的元素，实际年龄比所有人都大，看起来却是最小的，这直接导致了H有着比所有人都低的心理年龄
    作为IA族的大人（好吧，没有人敢不这么叫她），她和所有族员都保持着良好的关系（？），但是私下其实更喜欢VIIA族，似乎知道很多F的小秘密（？？
