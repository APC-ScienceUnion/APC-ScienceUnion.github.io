- title: 科普招生 | APC招生计划火热开启
  start: 2019-07-01
  end: 2019-07-30
  cover: https://i1.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1idzm81mg20j30hs0cwmxa.jpg
  content: |
    A.P.C.联盟（A派克联盟，以下简称联盟）是一个成立于2016年7月5日的一个学生科学组织，现主要由高中生和大学生组成，以QQ平台为主要基地。我们努力创造一个良好的网络群体环境，帮助有共同志向的同学一起努力奋进，现在也正在向科普方面发展。因进群有了考试制度，所以群内以学生为主，学习氛围较好，质量较高。

    【招生制度】
    我们注重联盟人员的选拔，每年春季及夏季（即寒暑假期间）我们均会举办招生考试来进行人员选拔。（例如在2017年寒假期间进行的线上考试，设有生物，数学，物理，化学，天文五个科目，任选一科考试合格即可加入联盟总部。）
    而在今年的七月，我们也将进行招生考试，选拔人才，且今年有数学、化学、物理、天文、生物、地理六门科目，卷子难度结构可自己选择，施展才能的机会大大增加！

    【加入我们】
    想加入的小伙伴们等通过考试后就可以和我们一起再创新的辉煌！我们期待你的加入~
    联盟招生考试QQ群：1027526691

    “望中国青年都能向上走，能做事的做事，能发声的发声，有一份热发一分光。”
    我们想发光，即便如萤火。但满天的萤火，也能化成星空，照耀神州。
    你，愿意成为光吗？
    ![活动海报](https://i1.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1idzm81mg20j30hs0cwmxa.jpg)

