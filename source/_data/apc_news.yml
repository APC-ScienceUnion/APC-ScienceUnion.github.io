  content: |
    纳尼亚传奇天津版———海河风云
    -我家楼梯直通加拉帕戈斯群岛，不出门就能采集标本。
    -多新鲜呐！我家一推门还是海河呢！阳台一蹦就能跳水，一个猛子上来就能做八珍豆腐！
    -好嘛，您这做饭可够容易的，那您这怎么上班啊？
    -嘛班不班的？乐呵乐呵得了。说起来你这怎么做饭啊？那地儿嘛也没有的！
    -做饭？什么是做饭？
    -当我没问，怪我怪我！
    达尔文：天狼王 
    摄影/棚子：斋蔻
    妆娘：傀儡
    后期：松子明
    欧洲文化顾问：Dimiter III
    化石静物摄影鸣谢：品
    日历页静物摄影鸣谢：白烟
