    道具组：手上水晶是梅林送的；桌上化石是超新星送的；盘子里的面包是超新星送的（稻香村老面包）；桌上的矿石标本来自格物社三行情书奖品，老马送的；茶杯是A.P.C.的7周年纪念款；手帕是猫盟CFCA的小森邻方巾；手上桌上的日历是果壳的2021熄灯号·万物和化石
