  start: 2018-08-03
  end: 2018-10-15
  cover: https://i1.wp.com/wx4.sinaimg.cn/large/006UcwnJgy1idzm81mg20j30hs0cwmxa.jpg
  content: |
    A.P.C将于8月3日至10月15日进行科普与辩论大赛第一赛季，有丰厚奖励，比赛条件：每名联盟成员都可参加，比赛在本群进行，并允许外部组织成员组织代表队集体参与。每次比赛内容必须交由管理员过审，请在管理员A3处报名
